<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>European Energy Markets</title>

  <!-- Tailwind CSS v4 — browser CDN (no build step required) -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Tailwind theme tokens + component classes -->
  <style type="text/tailwindcss">
    /* ================================================================
       THEME TOKENS — mapped to runtime CSS variables so dark/light
       switching works without a build step.
       ================================================================ */
    @theme inline {
      --color-app-bg:       var(--bg);
      --color-app-surface:  var(--surface);
      --color-app-surface2: var(--surface-2);
      --color-app-border:   var(--border);
      --color-app-text:     var(--text);
      --color-app-muted:    var(--muted);
      --color-app-blue:     var(--blue);
      --color-app-green:    var(--green);
      --color-app-red:      var(--red);
      --color-app-amber:    var(--amber);
      --color-app-orange:   var(--orange);
      --color-app-purple:   var(--purple);

      /* Corporate aesthetic — no rounded corners */
      --radius:    0px;
      --radius-sm: 0px;
      --radius-md: 0px;
      --radius-lg: 0px;
      --radius-xl: 0px;
    }

    /* ================================================================
       Custom color utilities
       ================================================================ */
    @layer utilities {
      .bg-app-bg       { background-color: var(--bg); }
      .bg-app-surface  { background-color: var(--surface); }
      .bg-app-surface2 { background-color: var(--surface-2); }

      .text-app-text   { color: var(--text); }
      .text-app-muted  { color: var(--muted); }
      .text-app-blue   { color: var(--blue); }
      .text-app-green  { color: var(--green); }
      .text-app-red    { color: var(--red); }
      .text-app-amber  { color: var(--amber); }
      .text-app-orange { color: var(--orange); }
      .text-app-purple { color: var(--purple); }

      .border-app-border  { border-color: var(--border); }
      .border-app-surface { border-color: var(--surface); }
      .border-app-blue    { border-color: var(--blue); }
      .border-app-green   { border-color: var(--green); }
      .border-app-red     { border-color: var(--red); }
      .border-app-amber   { border-color: var(--amber); }
      .border-app-orange  { border-color: var(--orange); }
      .border-app-purple  { border-color: var(--purple); }
    }

    /* ================================================================
       Component classes — JS-rendered innerHTML uses these class names.
       @apply keeps Tailwind as the single source of truth while
       leaving class names unchanged so no JS refactor is needed.
       ================================================================ */
    @layer components {

      /* ── Blocks / Surfaces ──────────────────────────────────────── */
      .section-block {
        @apply bg-app-surface border border-app-border;
      }

      .kpi-card {
        @apply bg-app-surface border border-app-border flex flex-col;
        padding: 9px 12px;
      }

      .chart-panel {
        @apply bg-app-surface border border-app-border;
      }

      .secondary-panel {
        @apply bg-app-surface border border-app-border overflow-hidden;
        min-height: 280px;
      }

      .secondary-panel + .secondary-panel {
        border-left: none;
      }

      .fwd-curve-card {
        @apply bg-app-surface border border-app-border flex flex-col;
      }

      /* ── Buttons ────────────────────────────────────────────────── */
      .btn-pill {
        @apply border border-app-border text-app-muted cursor-pointer bg-transparent;
        padding: 3px 10px;
        font-family: inherit;
        font-size: 11px;
        transition: color 0.1s, background 0.1s, border-color 0.1s;
      }

      .btn-pill:hover {
        @apply text-app-text;
        border-color: var(--muted);
      }

      .btn-pill--active {
        @apply bg-app-surface2 text-app-text border-app-blue;
      }

      .btn-pill--country {
        padding: 2px 8px;
      }

      .btn-pill--country:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .btn-secondary {
        @apply border border-app-border text-app-muted cursor-pointer bg-transparent;
        padding: 4px 12px;
        font-family: inherit;
        font-size: 11px;
        transition: color 0.15s, border-color 0.15s;
      }

      .btn-secondary:hover {
        @apply text-app-text;
        border-color: var(--muted);
      }

      .btn-icon {
        @apply border border-transparent text-app-muted cursor-pointer bg-transparent;
        padding: 4px 6px;
        font-size: 16px;
        line-height: 1;
        font-family: inherit;
        transition: color 0.15s, border-color 0.15s;
      }

      .btn-icon:hover {
        @apply text-app-text border-app-border;
      }

      /* ── Badges ─────────────────────────────────────────────────── */
      .regime-badge {
        @apply inline-block border;
        padding: 1px 7px;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .regime-low    { @apply text-app-green border-app-green; }
      .regime-normal { @apply text-app-amber border-app-amber; }
      .regime-high   { @apply text-app-red   border-app-red; }

      .eu-compare-badge {
        @apply inline-block border;
        padding: 1px 5px;
        font-size: 8px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .eu-compare-above  { @apply text-app-red   border-app-red; }
      .eu-compare-below  { @apply text-app-green border-app-green; }
      .eu-compare-inline { @apply text-app-amber border-app-amber; }

      .percentile-badge {
        @apply inline-block border border-app-border text-app-muted;
        padding: 1px 5px;
        font-size: 8px;
        font-weight: 700;
        letter-spacing: 0.06em;
      }

      /* Quality badges — previously missing CSS */
      .quality-badge {
        @apply inline-block border;
        padding: 1px 6px;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.06em;
      }

      .quality-badge--ok      { @apply text-app-green border-app-green; }
      .quality-badge--bad     { @apply text-app-red   border-app-red; }
      .quality-badge--warn    { @apply text-app-amber border-app-amber; }
      .quality-badge--neutral { @apply border-app-border text-app-muted; }

      /* ── Dropdowns ──────────────────────────────────────────────── */
      select {
        @apply bg-app-bg border border-app-border text-app-text cursor-pointer;
        font-family: inherit;
        font-size: 12px;
        padding: 3px 7px;
        outline: none;
      }

      select:focus {
        @apply border-app-blue;
      }
    }
  </style>

  <link rel="stylesheet" href="styles.css">
</head>
<body class="axiom-body" id="app-body">

  <!-- ================================================================== -->
  <!-- TOP BAR                                                              -->
  <!-- ================================================================== -->
  <header id="app-header" class="axiom-topbar">
    <div class="axiom-topbar-left">
      <span class="axiom-wordmark">TERMINAL.OS</span>
    </div>
    <div class="axiom-topbar-right">
      <nav class="axiom-topbar-nav">
        <button class="axiom-nav-item axiom-topbar-nav-item active" data-tab="overview">Overview</button>
        <button class="axiom-nav-item axiom-topbar-nav-item" data-tab="power">Power</button>
        <button class="axiom-nav-item axiom-topbar-nav-item" data-tab="commodities">Commodities</button>
      </nav>
      <button class="axiom-icon-btn" data-action="toggle-theme" aria-label="Toggle theme" title="Toggle theme"></button>
      <button class="axiom-icon-btn" data-action="open-cmd" aria-label="Command palette" title="Command palette (⌘K)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="6" cy="6" r="4"/><line x1="9.5" y1="9.5" x2="13" y2="13"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ================================================================== -->
  <!-- MAIN CONTAINER — sidebar + workspace + news sidebar                  -->
  <!-- ================================================================== -->
  <div class="axiom-main">

    <!-- LEFT SIDEBAR -->
    <aside id="app-sidebar" class="axiom-sidebar">
      <!-- Power page sidebar controls (shown when Power tab active) -->
      <div id="sidebar-power-controls" class="sidebar-controls" style="display:none;"></div>
      <!-- Commodity page sidebar controls (shown when Commodities tab active) -->
      <div id="sidebar-commodity-controls" class="sidebar-controls" style="display:none;"></div>
      <!-- Keyboard shortcut hint -->
      <div class="axiom-sidebar-hint">
        <kbd>⌘K</kbd> command palette
      </div>
    </aside>

    <!-- WORKSPACE -->
    <div class="axiom-workspace" id="axiom-workspace">

      <!-- OVERVIEW PAGE -->
      <div id="page-overview" class="page active axiom-page">
        <div id="market-table-container"></div>
        <div id="forward-curve-container"></div>
        <div id="resources-container"></div>
      </div>

      <!-- POWER MARKETS PAGE -->
      <div id="page-power" class="page axiom-page">
        <div id="controls-panel"></div>
        <div id="kpi-row"></div>
        <div class="page-body">
          <div class="chart-panel">
            <div id="chart-main-toolbar"></div>
            <div id="chart-main" class="chart-canvas chart-main"></div>
          </div>
          <div class="secondary-row secondary-row--three">
            <div class="secondary-panel" id="ranking-container"></div>
            <div class="secondary-panel chart-panel-sm">
              <div id="chart-title-spread-power" class="panel-title chart-title"></div>
              <div id="chart-spread" class="chart-canvas chart-sm"></div>
            </div>
            <div class="secondary-panel chart-panel-sm">
              <div id="chart-title-dist-power" class="panel-title chart-title"></div>
              <div id="chart-dist" class="chart-canvas chart-sm"></div>
            </div>
          </div>
          <div class="secondary-row secondary-row--two">
            <div class="secondary-panel chart-panel-sm">
              <div id="chart-title-monthly-power" class="panel-title chart-title"></div>
              <div id="chart-monthly" class="chart-canvas chart-sm"></div>
            </div>
            <div class="secondary-panel" id="heatmap-container"></div>
          </div>
        </div>
      </div>

      <!-- COMMODITY MARKETS PAGE -->
      <div id="page-commodities" class="page axiom-page">
        <div id="controls-panel-commodity"></div>
        <div id="kpi-row-commodity"></div>
        <div class="page-body">
          <div class="chart-panel">
            <div id="chart-title-main-commodity" class="panel-title chart-title"></div>
            <div id="chart-main-toolbar-commodity"></div>
            <div id="chart-main-commodity" class="chart-canvas chart-main"></div>
          </div>
          <div class="secondary-row secondary-row--three">
            <div class="secondary-panel" id="ranking-container-commodity"></div>
            <div class="secondary-panel chart-panel-sm">
              <div id="chart-title-spread-commodity" class="panel-title chart-title"></div>
              <div id="chart-spread-commodity" class="chart-canvas chart-sm"></div>
            </div>
            <div class="secondary-panel chart-panel-sm">
              <div id="chart-title-dist-commodity" class="panel-title chart-title"></div>
              <div id="chart-dist-commodity" class="chart-canvas chart-sm"></div>
            </div>
          </div>
          <div class="chart-panel">
            <div id="chart-title-monthly-commodity" class="panel-title chart-title"></div>
            <div id="chart-monthly-commodity" class="chart-canvas chart-monthly"></div>
          </div>
        </div>
      </div>

    </div><!-- /WORKSPACE -->

    <!-- RIGHT NEWS SIDEBAR -->
    <aside id="news-sidebar" class="axiom-news-sidebar">
      <div class="news-sidebar-header">
        <span class="news-sidebar-title">NEWS FEED</span>
      </div>
      <div id="news-sidebar-feed" class="news-sidebar-feed"></div>
    </aside>

  </div><!-- /MAIN CONTAINER -->
  <!-- ================================================================== -->
  <!-- OVERVIEW PAGE                                                        -->
  <!-- ================================================================== -->
  <div id="page-overview" class="page active">
    <div id="market-table-container"></div>
    <div id="forward-curve-container"></div>
  </div>

  <!-- ================================================================== -->
  <!-- POWER MARKETS PAGE                                                   -->
  <!-- ================================================================== -->
  <div id="page-power" class="page">
    <div id="controls-panel"></div>
    <div id="kpi-row"></div>

    <!-- page-body: outer padding + vertical gap between all block rows -->
    <div class="page-body px-5 py-4 flex flex-col gap-4">

      <div class="chart-panel">
        <div id="chart-main-toolbar"></div>
        <div id="chart-main" class="chart-canvas chart-main"></div>
      </div>

      <div class="secondary-row secondary-row--three">
        <div class="secondary-panel" id="ranking-container"></div>
        <div class="secondary-panel chart-panel-sm">
          <div id="chart-title-spread-power" class="panel-title chart-title"></div>
          <div id="chart-spread" class="chart-canvas chart-sm"></div>
        </div>
        <div class="secondary-panel chart-panel-sm">
          <div id="chart-title-dist-power" class="panel-title chart-title"></div>
          <div id="chart-dist" class="chart-canvas chart-sm"></div>
        </div>
      </div>

      <div class="secondary-row secondary-row--three">
        <div class="secondary-panel chart-panel-sm">
          <div id="chart-title-monthly-power" class="panel-title chart-title"></div>
          <div id="chart-monthly" class="chart-canvas chart-sm"></div>
        </div>
        <div class="secondary-panel" id="heatmap-container"></div>
        <div class="secondary-panel" id="news-container"></div>
      </div>

    </div>
  </div>

  <!-- ================================================================== -->
  <!-- BOTTOM TICKER BAR                                                    -->
  <!-- ================================================================== -->
  <footer id="ticker-bar" class="axiom-ticker">
    <div class="axiom-ticker-label">TICKER</div>
    <div class="axiom-ticker-scroll" id="ticker-scroll">
      <div class="axiom-ticker-inner" id="ticker-inner"></div>
    </div>
    <div id="app-warnings" style="display:none;"></div>
    <div class="axiom-status axiom-ticker-status" id="market-status">
      <span class="axiom-status-dot" id="status-dot"></span>
      <span class="axiom-status-label" id="status-label">STATUS: OPEN</span>
    </div>
    <span class="axiom-clock axiom-ticker-clock" id="app-clock">TIME: --:--:-- GMT</span>
    <div class="axiom-ticker-coverage" id="footer-coverage"></div>
  <div id="page-commodities" class="page">
    <div id="controls-panel-commodity"></div>
    <div id="kpi-row-commodity"></div>

    <!-- page-body: outer padding + vertical gap between all block rows -->
    <div class="page-body px-5 py-4 flex flex-col gap-4">

      <div class="chart-panel">
        <div id="chart-title-main-commodity" class="panel-title chart-title"></div>
        <div id="chart-main-toolbar-commodity"></div>
        <div id="chart-main-commodity" class="chart-canvas chart-main"></div>
      </div>

      <div class="secondary-row secondary-row--three">
        <div class="secondary-panel" id="ranking-container-commodity"></div>
        <div class="secondary-panel chart-panel-sm">
          <div id="chart-title-spread-commodity" class="panel-title chart-title"></div>
          <div id="chart-spread-commodity" class="chart-canvas chart-sm"></div>
        </div>
        <div class="secondary-panel chart-panel-sm">
          <div id="chart-title-dist-commodity" class="panel-title chart-title"></div>
          <div id="chart-dist-commodity" class="chart-canvas chart-sm"></div>
        </div>
      </div>

      <div class="chart-panel">
        <div id="chart-title-monthly-commodity" class="panel-title chart-title"></div>
        <div id="chart-monthly-commodity" class="chart-canvas chart-monthly"></div>
      </div>

    </div>
  </div>

  <!-- ================================================================== -->
  <!-- FOOTER                                                               -->
  <!-- ================================================================== -->
  <footer id="app-footer" class="mt-auto border-t border-app-border bg-app-surface min-h-[32px] flex items-center justify-center px-3 py-1.5">
    <span id="footer-coverage" class="text-[11px] text-app-muted tabular-nums"></span>
  </footer>

  <!-- ================================================================== -->
  <!-- COMMAND PALETTE                                                      -->
  <!-- ================================================================== -->
  <div id="cmd-palette" class="axiom-cmd-palette" aria-hidden="true">
    <div class="axiom-cmd-backdrop" id="cmd-backdrop"></div>
    <div class="axiom-cmd-panel" role="dialog" aria-label="Command palette">
      <div class="axiom-cmd-search">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" class="axiom-cmd-search-icon">
          <circle cx="6" cy="6" r="4"/><line x1="9.5" y1="9.5" x2="13" y2="13"/>
        </svg>
        <input id="cmd-input" class="axiom-cmd-input" type="text" placeholder="Switch market… (Power, Gas, Spain…)" autocomplete="off" spellcheck="false">
        <kbd class="axiom-cmd-esc">ESC</kbd>
      </div>
      <div id="cmd-results" class="axiom-cmd-results"></div>
      <div class="axiom-cmd-footer">
        <span><kbd>↑↓</kbd> navigate</span>
        <span><kbd>↵</kbd> select</span>
        <span><kbd>1</kbd>/<kbd>2</kbd>/<kbd>3</kbd> 1M/6M/1Y</span>
      </div>
    </div>
  </div>

  <!-- ================================================================== -->
  <!-- SCRIPTS — order matters                                              -->
  <!-- ================================================================== -->
  <script src="data.js"></script>
  <script src="futures.js"></script>
  <!-- ECharts from CDN. For offline dev, place echarts.min.js in public/ and
       change this src attribute to "echarts.min.js" (file is git-ignored). -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="vendor/echarts-map/echarts.min.js"></script>
  <script src="js/europe-geo.js"></script>
  <script src="js/state.js"></script>
  <script src="js/data-loader.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/map.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/overview.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/commodity-ui.js"></script>
  <script src="js/resources.js"></script>
  <script src="app.js"></script>

</body>
</html>
