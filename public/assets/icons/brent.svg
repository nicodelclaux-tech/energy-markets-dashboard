<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none">
  <!-- Oil barrel (Brent – platform silhouette) -->
  <rect x="4" y="3" width="12" height="14" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <line x1="4" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="1"/>
  <line x1="4" y1="13" x2="16" y2="13" stroke="currentColor" stroke-width="1"/>
  <line x1="7.5" y1="3" x2="7.5" y2="17" stroke="currentColor" stroke-width="0.75" stroke-opacity="0.4"/>
  <line x1="12.5" y1="3" x2="12.5" y2="17" stroke="currentColor" stroke-width="0.75" stroke-opacity="0.4"/>
  <!-- North Sea platform mast -->
  <line x1="10" y1="1" x2="10" y2="3" stroke="currentColor" stroke-width="1.5"/>
  <line x1="8.5" y1="1.5" x2="11.5" y2="1.5" stroke="currentColor" stroke-width="1"/>
</svg>
